spring.application.name=PeliPop
server.port=${PORT:${SERVER_PORT:5000}}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

tmdb.api.key=${TMDB_API_KEY}
tmdb.api.url=${TMDB_API_URL}

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expirationMs=${APP_JWT_EXPIRATION_MS}

spring.data.redis.url=${REDIS_URL}
spring.data.redis.timeout=${REDIS_TIMEOUT}
app.redis.ttl=${APP_REDIS_TTL}

app.mongo.uri=${APP_MONGO_URI}
app.mongo.db=${APP_MONGO_DB}
app.analytics.cron=0 */15 * * * *

management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=healthz
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.redis.enabled=true
management.health.db.enabled=true
management.info.env.enabled=true

info.app.name=PeliPop
info.app.version=@project.version@
info.app.description=Movie API